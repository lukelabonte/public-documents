<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luke's Documents</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F2;
    --surface: #FFFFFF;
    --surface-alt: #F5F0E8;
    --border: #E4DDD1;
    --border-strong: #C8BFAE;
    --text: #2D2518;
    --text-muted: #6B6152;
    --text-light: #96897A;
    --accent: #B5632E;
    --accent-light: #E8A86D;
    --accent-bg: #FDF3EB;
    --shadow-sm: 0 1px 3px rgba(45,37,24,0.06);
    --shadow-md: 0 4px 12px rgba(45,37,24,0.08);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 48px 20px 40px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 40px;
  }

  .header-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .header .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 400;
  }

  /* Section */
  .section {
    margin-bottom: 40px;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--border);
  }

  /* Document card */
  .doc-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  }

  .doc-card:hover {
    border-color: var(--accent-light);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .doc-icon {
    font-size: 28px;
    flex-shrink: 0;
  }

  .doc-info {
    flex: 1;
    min-width: 0;
  }

  .doc-title {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 3px;
  }

  .doc-description {
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  .doc-arrow {
    color: var(--accent-light);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding-top: 32px;
    border-top: 1.5px solid var(--border);
    color: var(--text-light);
    font-size: 0.825rem;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">📄</div>
    <h1>Luke's Documents</h1>
    <p class="subtitle">Guides and references shared publicly</p>
  </div>

  <div class="section">
    <div class="section-title">Pets</div>

    <a href="pets/dog-feeding-guide.html" class="doc-card">
      <div class="doc-icon">🐕</div>
      <div class="doc-info">
        <div class="doc-title">Dog Feeding Guide</div>
        <div class="doc-description">Feeding schedule, portion sizes, and dietary notes</div>
      </div>
      <div class="doc-arrow">→</div>
    </a>
  </div>

  <div class="footer">
    Hosted on GitHub Pages
  </div>

</div>
</body>
</html>
